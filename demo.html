<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Card Design</title>
    <!-- Google Fonts (Inter font image-er font-er moto dekh-te) -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* CSS Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f5f7fa;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Card container */
        .card {
            background-color: #ffffff;
            width: 380px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            /* Purple top border */
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .open-border{ border-top: 6px solid #a855f7;}
        .close-border{}

        /* Header section (Icon & Priority) */
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 24px 24px 12px 24px;
        }

        .icon-circle {
            width: 38px;
            height: 38px;
            background-color: #f3e8ff;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #a855f7;
        }

        .priority-badge {
            background-color: #f1f3f5;
            color: #94a3b8;
            padding: 10px 32px;
            border-radius: 50px;
            font-size: 18px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        /* Body content */
        .card-body {
            padding: 12px 24px 24px 24px;
        }

        .card-title {
            font-size: 22px;
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 12px;
            line-height: 1.2;
        }

        .card-desc {
            font-size: 16px;
            color: #64748b;
            margin-bottom: 22px;
            line-height: 1.4;
        }

        /* Tag section */
        .tag-enhancement {
            display: inline-flex;
            align-items: center;
            background-color: #ecfdf5;
            color: #10b981;
            padding: 8px 16px;
            border-radius: 50px;
            border: 1.5px solid #d1fae5;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .sparkle-icon {
            margin-right: 6px;
            font-size: 16px;
        }

        /* Footer section */
        .card-footer {
            padding: 24px;
            border-top: 1px solid #f1f5f9;
        }

        .footer-text {
            color: #64748b;
            font-size: 15px;
            margin-bottom: 10px;
        }

        .footer-date {
            color: #64748b;
            font-size: 16px;
            font-weight: 500;
        }

    </style>
</head>
<body>

    <div class="card open-border">
        <!-- Icon and Priority Badge -->
        <div class="card-header">
            <div class="icon-circle">
                <!-- SVG Checkmark Icon -->
                <div width="20" height="20" >
                    <img src="assets/Open-Status.png" alt="">
                </div>
            </div>
            <div class="priority-badge"> ${element.priority}</div>
        </div>

        <!-- Task Info -->
        <div class="card-body">
            <h2 class="card-title"> ${element.title}</h2>
            <p class="card-desc">${element.description}</p>
            
            <div>
            <div class="tag-enhancement">
                <span class="sparkle-icon"> ${element.labels[0]}</span>
            </div>
            <div class="tag-enhancement">
                <span class="sparkle-icon"> ${element.labels[1]}</span>
            </div>
            </div>
        </div>

        <!-- Metadata -->
        <div class="card-footer">
            <p class="footer-text">${element.id} ${element.author}</p>
            <p class="footer-date"> ${element.updatedAt}</p>
        </div>
        </div> `;

</body>
</html>
