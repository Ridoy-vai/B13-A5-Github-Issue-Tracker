<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Card Design</title>
    <!-- Google Fonts (Inter font image-er font-er moto dekh-te) -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* CSS Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f5f7fa;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Card container */
        .card {
            background-color: #ffffff;
            width: 380px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            /* Purple top border */
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .open-border{ border-top: 6px solid #a855f7;}
        .close-border{}

        /* Header section (Icon & Priority) */
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 24px 24px 12px 24px;
        }

        .icon-circle {
            width: 38px;
            height: 38px;
            background-color: #f3e8ff;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #a855f7;
        }

        .priority-badge {
            background-color: #f1f3f5;
            color: #94a3b8;
            padding: 10px 32px;
            border-radius: 50px;
            font-size: 18px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        /* Body content */
        .card-body {
            padding: 12px 24px 24px 24px;
        }

        .card-title {
            font-size: 22px;
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 12px;
            line-height: 1.2;
        }

        .card-desc {
            font-size: 16px;
            color: #64748b;
            margin-bottom: 22px;
            line-height: 1.4;
        }

        /* Tag section */
        .tag-enhancement {
            display: inline-flex;
            align-items: center;
            background-color: #ecfdf5;
            color: #10b981;
            padding: 8px 16px;
            border-radius: 50px;
            border: 1.5px solid #d1fae5;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .sparkle-icon {
            margin-right: 6px;
            font-size: 16px;
        }

        /* Footer section */
        .card-footer {
            padding: 24px;
            border-top: 1px solid #f1f5f9;
        }

        .footer-text {
            color: #64748b;
            font-size: 15px;
            margin-bottom: 10px;
        }

        .footer-date {
            color: #64748b;
            font-size: 16px;
            font-weight: 500;
        }

    </style>
</head>
<body>
<dialog id="my_modal_1" class="modal modal-bottom sm:modal-middle transition-all duration-300">
  <div class="modal-box max-w-xl p-0 overflow-hidden bg-base-100 shadow-2xl border border-base-200">
    
    <!-- Modal Header with Close Button -->
    <div class="relative h-2 w-full bg-primary"></div> <!-- Top accent bar -->
    <div class="flex justify-between items-start p-6 pb-0">
      <div class="flex items-center gap-4">
        <div class="avatar placeholder">
          <div class="bg-primary text-primary-content rounded-full w-12 shadow-md">
            <!-- Icon/Initial based on author -->
            <span class="text-xl font-bold">${modal.author.charAt(0)}</span>
          </div>
        </div>
        <div>
          <div class="badge badge-error badge-outline font-semibold uppercase text-[10px] tracking-widest mb-1">
            ${modal.priority} Priority
          </div>
          <h2 class="text-2xl font-bold text-base-content tracking-tight">
            ${modal.title}
          </h2>
        </div>
      </div>
      <form method="dialog">
        <button class="btn btn-sm btn-circle btn-ghost absolute right-4 top-4">✕</button>
      </form>
    </div>

    <!-- Modal Body -->
    <div class="p-6 space-y-4">
      <p class="text-base-content/70 leading-relaxed text-lg">
        ${modal.description}
      </p>

      <!-- Tags Section -->
      <div class="flex flex-wrap gap-2 pt-2">
        <span class="badge badge-secondary badge-lg py-4 px-4 gap-2 font-medium italic">
          ✨ ${labels[0] || "General"}
        </span>
        <span class="badge badge-accent badge-lg py-4 px-4 gap-2 font-medium italic">
          🚀 ${labels[1] || "Update"}
        </span>
      </div>
    </div>

    <!-- Modal Footer Info -->
    <div class="bg-base-200/50 p-6 flex flex-col sm:flex-row justify-between items-center gap-4">
      <div class="flex flex-col">
        <span class="text-xs uppercase font-bold text-base-content/40 tracking-wider">Created By</span>
        <span class="text-sm font-medium text-base-content italic underline decoration-primary underline-offset-4">
          ID: ${modal.id} — ${modal.author}
        </span>
      </div>
      
      <div class="text-right">
        <span class="text-xs uppercase font-bold text-base-content/40 tracking-wider block">Last Updated</span>
        <span class="text-sm font-semibold text-base-content/80">
          ${modal.updatedAt}
        </span>
      </div>
    </div>

    <!-- Final Action Button -->
    <div class="modal-action p-4 pt-0">
      <form method="dialog" class="w-full">
        <button class="btn btn-primary w-full shadow-lg hover:shadow-primary/30 transition-all">
          Got It, Thanks!
        </button>
      </form>
    </div>
  </div>
  
  <!-- Backdrop (Click outside to close) -->
  <form method="dialog" class="modal-backdrop bg-black/40 backdrop-blur-sm">
    <button>close</button>
  </form>
</dialog>

</body>
</html>
