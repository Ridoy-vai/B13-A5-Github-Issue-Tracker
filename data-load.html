<!DOCTYPE html>
<html lang="en">

<head>
    <!-- Basic Meta -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- DaisyUI & TailwindCSS -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- google fonr -->
     <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- font wasome -->
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" 
     integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" 
     crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- Custom CSS -->
    <link rel="stylesheet" href="stayle/data.css">
    <link rel="stylesheet" href="stayle/card.css">

    <title>GitHub Issue Tracker</title>
</head>

<body>

    <!-- Nav bar -->
    <nav>
        <div class="navbar bg-base-100 shadow-sm">
            <div class="flex flex-1 nav">
                <div class="nav-logo">
                    <img src="assets/github-logo.png" alt="">
                </div>
                <p>GitHub Issues Tracker</p>
            </div>
            <div class="flex gap-2">
                <input type="text" id="search-input" placeholder="Search issue" class="input input-bordered w-24 md:w-auto" />
                <button id="search-button" class="btn btn-primary">Search</button>
            </div>
        </div>
    </nav>

<main class="max-w-[1100px] mx-auto mt-4">
        <!-- button tab all open and close -->
    <div>
        <div class="tabs tabs-box">
            <input type="radio" id="all-status" name="my_tabs_1" class="tab w-[100px]" aria-label="All" checked="checked"/>
            <input type="radio" id="open-status" name="my_tabs_1" class="tab w-[100px]" aria-label="Open" />
            <input type="radio" id="close-status" name="my_tabs_1" class="tab w-[100px]" aria-label="Closed" />
        </div>
    </div>

    <!-- issue counter tab -->
    <div class="isuBox">
        <div class="issu-header">
            <div><img src="assets/Aperture.png" alt=""></div>
            <div>
                <p><span id="data-count">0</span> Issues</p>
                <p>Track and manage your project issues</p>
            </div>
        </div>
        <div class="issu-status">
            <span class="open-status"></span><p>Open</p><span class="close-status"></span><p>close</p>
        </div>
    </div>
    <!-- loading -->
    <div class="loader-box ">
        <span class="loading hidden loading-spinner loading-xl"></span>
    </div>
    <!-- Data load box -->
    <div class="data-body" id="data-Box"> </div>
</main>

<!-- Open the modal using ID.showModal() method -->

<dialog id="my_modal_5" class="modal modal-bottom sm:modal-middle">
  <div class="modal-box max-w-2xl p-8 rounded-3xl">
    <div id="detail-container"></div>
    <div class="modal-action">
      <form method="dialog">
        <button class="px-8 py-3 bg-[#6300FF] hover:bg-[#5200D5] text-white font-bold rounded-xl transition-all">Close</button>
      </form>
    </div>
  </div>
</dialog>
   
    <script src="js file/data.js"></script>
</body>
</html>
